# fly.toml app configuration file for pypsa-helper-bot
# Discord bot configuration (no HTTP service needed)

app = 'pypsa-helper-bot'
primary_region = 'iad'

[build]

[env]
  INDEX_CHECK_INTERVAL = '300'
  PYTHONUNBUFFERED = '1'

# Discord bots don't need HTTP service, but we keep auto-start/stop settings
[http_service]
  auto_stop_machines = 'off'  # Keep bot always running
  auto_start_machines = true
  min_machines_running = 1    # Always keep 1 instance running

[vm]
  size = 'shared-cpu-1x'
  memory = '256mb'
