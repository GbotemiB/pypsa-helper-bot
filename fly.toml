# fly.toml app configuration file for pypsa-helper-bot
# Discord bot configuration (no HTTP service needed)

app = 'pypsa-helper-bot'
primary_region = 'iad'
kill_signal = 'SIGINT'
kill_timeout = '10s'

[experimental]
  auto_rollback = true

[build]

[env]
  PYTHONUNBUFFERED = '1'
  INDEX_CHECK_INTERVAL = '300'

# No HTTP service needed for Discord bot
# Using [[vm]] instead of [http_service] to avoid port expectations
[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
