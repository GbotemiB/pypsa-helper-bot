name: Knowledge Base Reindex

on:
  push:
    branches:
      - main
    paths:
      - 'src/ingest.py'
      - 'requirements.txt'
      - '.github/workflows/reindex.yml'
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  reindex:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # 2 hours max
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run ingestion script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src
          python ingest.py
      
      - name: Create timestamp file
        run: |
          echo "$(date -u +"%Y-%m-%d %H:%M:%S UTC")" > pypsa_ecosystem_faiss_index/last_updated.txt
          echo "GitHub Actions Run: ${{ github.run_number }}" >> pypsa_ecosystem_faiss_index/last_updated.txt
      
      - name: Compress FAISS index
        run: |
          tar -czf faiss-index.tar.gz pypsa_ecosystem_faiss_index/
      
      - name: Generate release tag
        id: tag
        run: |
          echo "tag=index-$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
      
      - name: Create Release and Upload Index
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Knowledge Base Index - $(date -u +%Y-%m-%d)"
          body: |
            Automated knowledge base reindex
            
            **Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            **Run:** #${{ github.run_number }}
            
            This release contains the latest FAISS vector index for the PyPSA ecosystem.
            
            ### Repositories Indexed:
            - PyPSA/pypsa
            - PyPSA/pypsa-eur  
            - pypsa-meets-earth/pypsa-earth
            
            ### Content Included:
            - Documentation (.rst files)
            - Source code (.py files)
            - Configuration files (.yaml/.yml)
            - GitHub Issues and Pull Requests
          files: faiss-index.tar.gz
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Clean up old releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        with:
          keep_latest: 7 # Keep last 7 days of indexes
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Knowledge Base Reindex Failed',
              body: `The automated reindex workflow failed.\n\n**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automation']
            });
