name: Deploy to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/pypsa-helper-bot:${{ github.sha }},${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/pypsa-helper-bot:latest
      
      - name: Deploy to Azure Container Instances
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy container
        run: |
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name pypsa-helper-bot \
            --image ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/pypsa-helper-bot:latest \
            --registry-login-server ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io \
            --registry-username ${{ secrets.AZURE_REGISTRY_USERNAME }} \
            --registry-password ${{ secrets.AZURE_REGISTRY_PASSWORD }} \
            --environment-variables \
              DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }} \
              GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }} \
              INDEX_CHECK_INTERVAL=300 \
              PYTHONUNBUFFERED=1 \
            --cpu 1 \
            --memory 0.5 \
            --restart-policy Always
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Bot is now running on Azure Container Instances"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
